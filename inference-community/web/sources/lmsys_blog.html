than 500 TPS on 8xB300 (bs=1)\\n- Sync free speculative decoding for GLM 5.2 MTP\\n- Built-in IndexShare MTP with Spec V2\\n- 2.33x faster TopK-V2 for ISL 80k\\n- Indexer prologue fusion\\n- Gemm kernels...\",\"category\":\"sglang\",\"type\":\"blog\"},{\"slug\":\"2026-07-10-rocm-miles-dsv4\",\"title\":\"Bringing DeepSeek-V4 Flash RL Training to AMD Instinct MI355X GPUs with Miles\",\"author\":\"AMD \u0026 Miles Team\",\"date\":\"July 10, 2026\",\"previewImg\":\"/images/blog/rocm-miles-dsv4/preview.png\",\"excerpt\":\"DeepSeek-V4 RL is now supported in Miles on AMD Instinct™ MI355X GPUs with ROCm™! RL requires SGLang rollout and Megatron training to implement the same policy closely enough that token probabilities ...\",\"category\":\"general\",\"type\":\"news\"},{\"slug\":\"2026-06-27-netpreme-xmem\",\"title\":\"Accelerating SGLang HiCache with Netpreme X-Mem™ MPU\",\"author\":\"Netpreme Team\",\"date\":\"July 8, 2026\",\"previewImg\":\"/images/blog/netpreme-xmem/figure1.png\",\"excerpt\":\"Netpreme X-Mem™ Memory Processing Unit (MPU) makes SGLang HiCache faster and more scalable by augmenting the slower Host DRAM offload tier with a purpose-built high-bandwidth KV memory tier.\\n\\n\\n\\n\\n\\n- Pr...\",\"category\":\"sglang\",\"type\":\"technical\"},{\"slug\":\"2026-07-06-dspark-sglang\",\"title\":\"DSpark in SGLang: Speculative Decoding with Confidence-Driven, Variable-Length Verification\",\"author\":\"SGLang Team\",\"date\":\"July 6, 2026\",\"previewImg\":\"/images/blog/dspark-sglang/perf-compare.png\",\"excerpt\":\"Speculative decoding trades extra compute for fewer decode steps, and the trade\\nsours as load grows: at batch size B with K speculative tokens the target\\nverifies B  K tokens every step, and past a po...\",\"category\":\"sglang\",\"type\":\"blog\"},{\"slug\":\"2026-07-02-agent-assisted-sglang-development\",\"title\":\"Agent-Assisted SGLang Development: An Initial Exploration\",\"author\":\"SGLang Team\",\"date\":\"July 2, 2026\",\"previewImg\":\
