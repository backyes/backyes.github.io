<h3>[96] 北京同有飞骥科技股份有限公司（同有科技） <span class="tag cat non">上市公司</span></h3>
<div class="kv">SZ.300302，1998年11月成立，董事长 <b>周泽湘</b>，2012年3月深交所A股上市（国内唯一上市的企业级专业存储厂商）。深耕存储行业三十余年，主营数据存储产品、数据管理产品。2020年入选国家工信部专精特新"小巨人"；投资企业级PCIe SSD厂商忆恒创源(Memblaze，2022年营收近12亿)。2024年国家级专利密集型产品、2023年国家级专精特新小巨人。</div>
